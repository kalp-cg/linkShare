<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DhanPath Tracker - Download Now</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 400px;
        }

        .header {
            margin-bottom: 40px;
        }

        .app-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: bold;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .tagline {
            font-size: 16px;
            color: #999;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .features {
            text-align: left;
            margin: 30px 0;
            padding: 20px;
            background: #111;
            border-radius: 10px;
        }

        .feature-item {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            font-size: 14px;
        }

        .feature-item:last-child {
            margin-bottom: 0;
        }

        .feature-icon {
            width: 24px;
            height: 24px;
            background: #667eea;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            font-size: 12px;
            flex-shrink: 0;
        }

        .download-btn {
            display: inline-block;
            padding: 16px 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            margin-top: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
            border: none;
            cursor: pointer;
        }

        .download-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .download-btn:active {
            transform: scale(0.98);
        }

        .store-badge {
            margin-top: 20px;
            font-size: 12px;
            color: #666;
        }

        .store-badge img {
            height: 40px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="app-icon">💰</div>
            <h1>DhanPath Tracker</h1>
            <p class="tagline">Track your finances with ease. Smart spending insights at your fingertips.</p>
        </div>

        <div class="features">
            <div class="feature-item">
                <div class="feature-icon">✓</div>
                <span>Track Income & Expenses</span>
            </div>
            <div class="feature-item">
                <div class="feature-icon">✓</div>
                <span>Budget Management</span>
            </div>
            <div class="feature-item">
                <div class="feature-icon">✓</div>
                <span>Financial Analytics</span>
            </div>
            <div class="feature-item">
                <div class="feature-icon">✓</div>
                <span>Secure & Private</span>
            </div>
        </div>

        <a href="https://play.google.com/store/apps/details?id=com.dhanpath.tracker&pcampaignid=web_share" 
           class="download-btn" 
           target="_blank">
            Download Now
        </a>

        <div class="store-badge">
            Available on Google Play Store
        </div>
    </div>
</body>
</html>
